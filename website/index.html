<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon – Ahmad Aripin</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-start: #0f0c29;   /* dark violet */
            --bg-end:   #302b63;   /* deep indigo */
            --accent:   #ec4899;   /* pink */
            --text:     #f4f4f5;   /* near‑white */
        }
        * {margin:0; padding:0; box-sizing:border-box;}
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            max-width: 460px;
            width: 100%;
            animation: fadeIn .8s ease-out;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text);
        }
        .timer {
            display: flex;
            justify-content: space-between;
        }
        .timer div {flex:1;}
        .timer span {
            display: block;
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent);
        }
        .timer small {
            display: block;
            font-size: .75rem;
            color: var(--text);
        }
        .btn-back {
            align-self: flex-start;               /* kiri */
            display: inline-flex;
            align-items: center;
            padding: .6rem 1rem;                  /* lebih kecil */
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: .9rem;                     /* teks kecil */
            transition: transform .2s, box-shadow .2s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236,72,153,.3);
        }
        .btn-back .arrow {margin-right:.4rem; font-size:1.2rem;}
        @keyframes fadeIn{from{opacity:0; transform:translateY(20px);}to{opacity:1; transform:none;}}
        @media (max-width:480px){
            h1{font-size:1.8rem;}
            .timer span{font-size:1.5rem;}
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Segera Hadir!</h1>
        <p>Situs kami sedang dalam proses pengembangan. Tetap disini, kami akan kembali dalam beberapa hari.</p>

        <div class="timer">
            <div><span id="days">00</span><small>Hari</small></div>
            <div><span id="hours">00</span><small>Jam</small></div>
            <div><span id="minutes">00</span><small>Menit</small></div>
            <div><span id="seconds">00</span><small>Detik</small></div>
        </div>

        <!-- Tombol Back (kiri, lebih kecil) -->
        <a href="javascript:history.back()" class="btn-back">
            <span class="arrow">←</span>Kembali
        </a>
    </div>

    <script>
        // Simple countdown (set target date here)
        const target = new Date();
        target.setDate(target.getDate() + 10); // 10 hari ke depan

        function updateTimer(){
            const now = new Date();
            const diff = target - now;
            if(diff <= 0){
                document.querySelectorAll('.timer span').forEach(s=>s.textContent='00');
                return;
            }
            const d = Math.floor(diff/1000/60/60/24);
            const h = Math.floor(diff/1000/60/60)%24;
            const m = Math.floor(diff/1000/60)%60;
            const s = Math.floor(diff/1000)%60;
            document.getElementById('days').textContent = String(d).padStart(2,'0');
            document.getElementById('hours').textContent = String(h).padStart(2,'0');
            document.getElementById('minutes').textContent = String(m).padStart(2,'0');
            document.getElementById('seconds').textContent = String(s).padStart(2,'0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
